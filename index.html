<body>
  <div class="desktop">
    <div class="window header-window">
      <div class="title-bar">
        <div class="title-bar-text">Guus Seldenthuis .nl</div>
        <div class="title-bar-controls">
          <button aria-label="Minimize" class="minimize-btn"></button>
          <button aria-label="Close" class="close-btn"></button>
        </div>
      </div>
      <div class="window-body">
        <p>Welcome on my webpage, I'm happy you're here. (:</p>
        <p>This is the place where I reveal my thoughts by writing to the vast and great internet.</p>
      </div>
    </div>

    <div class="window blog-window">
      <div class="title-bar">
        <div class="title-bar-text">Explorer</div>
        <div class="title-bar-controls">
          <button aria-label="Minimize" class="minimize-btn"></button>
          <button aria-label="Close" class="close-btn"></button>
        </div>
      </div>
      <div class="window-body">
        <p class="blog-date"><strong>Posted:</strong> 24-02-2026</p>
        <p>I miss windows xp</p>
      </div>
    </div>
  </div>

  <script>
    // Window controls functionality
    document.addEventListener('DOMContentLoaded', function() {
      // Handle minimize buttons
      const minimizeButtons = document.querySelectorAll('.minimize-btn');
      minimizeButtons.forEach(function(button) {
        button.addEventListener('click', function(e) {
          e.stopPropagation();
          const window = this.closest('.window');
          const windowBody = window.querySelector('.window-body');

          if (windowBody.style.display === 'none') {
            // Restore window
            windowBody.style.display = 'block';
            this.setAttribute('aria-label', 'Minimize');
            this.classList.remove('maximize-btn');
            this.classList.add('minimize-btn');
          } else {
            // Minimize window
            windowBody.style.display = 'none';
            this.setAttribute('aria-label', 'Maximize');
            this.classList.remove('minimize-btn');
            this.classList.add('maximize-btn');
          }
        });
      });

      // Handle close buttons
      const closeButtons = document.querySelectorAll('.close-btn');
      closeButtons.forEach(function(button) {
        button.addEventListener('click', function(e) {
          e.stopPropagation();
          const window = this.closest('.window');
          window.style.display = 'none';
        });
      });

      // Drag functionality for windows
      let isDragging = false;
      let currentWindow = null;
      let offsetX = 0;
      let offsetY = 0;

      const titleBars = document.querySelectorAll('.title-bar');
      titleBars.forEach(function(titleBar) {
        titleBar.addEventListener('mousedown', function(e) {
          // Don't drag if clicking on buttons
          if (e.target.closest('.title-bar-controls')) {
            return;
          }

          isDragging = true;
          currentWindow = this.closest('.window');

          const rect = currentWindow.getBoundingClientRect();
          offsetX = e.clientX - rect.left;
          offsetY = e.clientY - rect.top;

          currentWindow.style.transition = 'none';
        });
      });

      document.addEventListener('mousemove', function(e) {
        if (!isDragging || !currentWindow) return;

        const x = e.clientX - offsetX;
        const y = e.clientY - offsetY;

        currentWindow.style.left = x + 'px';
        currentWindow.style.top = y + 'px';
      });

      document.addEventListener('mouseup', function() {
        if (currentWindow) {
          currentWindow.style.transition = '';
        }
        isDragging = false;
        currentWindow = null;
      });
    });
  </script>
</body>

</html>
